id = "forge-inbox"
name = "Forge Inbox"
bundle_id = "com.sympoies.forge-inbox"
version = "1.2.10"
script_filter = "script_filter.sh"
action = "action_open.sh"
assets = ["src/assets/icon.png"]

[env]
# Optional absolute path override for the external forge-cli runtime.
FORGE_CLI_BIN = ""
# Default provider mode: all, gh, or glab.
FORGE_INBOX_PROVIDER_MODE = "all"
# Default item mode: all, pr, or issue.
FORGE_INBOX_ITEM_MODE = "all"
# GitLab host passed to forge-cli inbox. Keep empty for portable packages.
FORGE_INBOX_GITLAB_HOST = ""
# Show non-blocking configuration warning rows, such as mixed-mode GitLab host
# fallback notices.
FORGE_INBOX_SHOW_CONFIG_WARNINGS = "false"
# Maximum rows requested from forge-cli, clamped to 1..100.
FORGE_INBOX_LIMIT = "30"

[alfred]
min_alfred = "5"
min_macos = "13.0"
