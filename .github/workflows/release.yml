name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  package:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install codex-cli for packaging
        run: |
          source scripts/lib/codex_cli_version.sh
          cargo install "${CODEX_CLI_CRATE}" --version "${CODEX_CLI_VERSION}" --locked

      - name: Regenerate third-party artifacts
        run: bash scripts/generate-third-party-artifacts.sh --write

      - name: Verify third-party artifacts
        run: bash scripts/generate-third-party-artifacts.sh --check

      - name: Package all workflows
        run: scripts/workflow-pack.sh --all

      - name: Build bundled release archive
        run: |
          bash scripts/ci/build-release-bundle.sh --tag "${GITHUB_REF_NAME}"

      - name: Audit release bundle third-party artifacts
        run: |
          bash scripts/ci/release-bundle-third-party-audit.sh \
            --tag "${GITHUB_REF_NAME}" \
            --dist-dir dist/release-bundles

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/**/*.alfredworkflow
            dist/**/*.alfredworkflow.sha256
            dist/release-bundles/*.zip
            dist/release-bundles/*.zip.sha256
            dist/release-bundles/workflow-clear-quarantine-standalone.sh
            dist/release-bundles/workflow-clear-quarantine-standalone.sh.sha256
            dist/release-bundles/THIRD_PARTY_LICENSES.md
            dist/release-bundles/THIRD_PARTY_LICENSES.md.sha256
            dist/release-bundles/THIRD_PARTY_NOTICES.md
            dist/release-bundles/THIRD_PARTY_NOTICES.md.sha256
